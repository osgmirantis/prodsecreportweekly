name: Aikido weekly security report

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      week_start:
        description: "Report week Monday (YYYY-MM-DD). Empty = current week"
        required: false
        default: ""
      baseline_date:
        description: "Baseline 'As of' date (YYYY-MM-DD). Empty = week start"
        required: false
        default: ""
      issue_type:
        description: "Limit to one Aikido issue type (e.g. sast). Empty = all"
        required: false
        default: ""
      dry_run:
        description: "Print the table only, don't touch the sheet"
        type: boolean
        default: false
      debug_csv:
        description: "Upload per-issue audit CSVs (added/resolved) as a run artifact"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report and update Google Sheet
        env:
          AIKIDO_WORKSPACES: ${{ secrets.AIKIDO_WORKSPACES }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}  # legacy fallback: tabs in one file
          # Email delivery (optional; active when EMAIL_TO is set)
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_WEEK_START: ${{ inputs.week_start }}
          REPORT_BASELINE_DATE: ${{ inputs.baseline_date }}
          AIKIDO_ISSUE_TYPE: ${{ inputs.issue_type }}
          DRY_RUN: ${{ inputs.dry_run }}
          DEBUG_CSV_DIR: ${{ inputs.debug_csv == true && 'debug_csv' || '' }}
          REPORT_TIMEZONE: "Europe/Madrid"
          REPORT_WEEK_DAYS: "7"
          # TEAM_PREFIX: "Product:"
          EXCLUDE_IGNORED_BY: "auto,rule"
        run: python scripts/aikido_weekly_report.py

      - name: Upload audit CSVs
        if: ${{ inputs.debug_csv == true }}
        uses: actions/upload-artifact@v4
        with:
          name: aikido-audit-csv
          path: debug_csv/
          retention-days: 14
